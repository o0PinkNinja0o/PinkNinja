<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PinkNinja'sPortfolio" />
  <title>PinkNinja'sPortfolio</title>
  <link rel="stylesheet" href="../style/index.css" />
</head>
<body>
  <div class="sky-bg" aria-hidden="true">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
  </div>
  <div class="bubbles" aria-hidden="true">
    <img src="../images/floating/star.png" alt="Floating star" class="size-xl" />
    <img src="../images/floating/clippy.png" alt="Floating paper clip" class="size-md" />
    <img src="../images/floating/music.png" alt="Floating music note" class="size-sm" />
    <img src="../images/floating/jellyfish.png" alt="Floating jellyfish" class="size-lg" />
    <img src="../images/floating/uranus.png" alt="Floating planet" class="size-md" />
    <img src="../images/floating/mrdna.png" alt="Floating Mr DNA" class="size-lg" />
    <img src="../images/floating/computer.png" alt="Floating computer" class="size-lg" />
    <img src="../images/floating/greencloud1.png" alt="Floating cloud" class="size-lg" />
    <img src="../images/floating/greencloud2.png" alt="Floating cloud" class="size-md" />
    <img src="../images/floating/greenperson.png" alt="Floating person" class="size-md" />
    <img src="../images/floating/tv.png" alt="Floating TV" class="size-md" />
    <img src="../images/floating/star.png" alt="Floating star" class="size-md" />
    <img src="../images/floating/music.png" alt="Floating music note" class="size-sm" />
    <img src="../images/floating/greencloud2.png" alt="Floating cloud" class="size-lg" />
    <img src="../images/floating/jellyfish.png" alt="Floating jellyfish" class="size-md" />
    <img src="../images/floating/computer.png" alt="Floating computer" class="size-lg" />
  </div>
  <main class="layout">
    <section class="profile-panel">
      <div class="profile-card">
        <img src="../images/floating/greenperson.png" alt="Profile preview" />
      </div>
    </section>

    <section class="content-panel">
      <div class="speech-bubble">
        <p>Hi — I’m Pink Ninja. I create animated worlds, merch drops and playful digital experiences.</p>
      </div>

      <aside class="window">
        <div class="window-header">
          <h1>Pink Ninja</h1>
        </div>

        <div class="intro-card">
          <h2>Introduction</h2>
          <p class="intro">Digital Artist • Animator • Digital Mischief</p>
        </div>

        <div class="directory">
          <a class="dir-btn" href="#">Visual Vault</a>
          <a class="dir-btn" href="#">Flicker Field</a>
          <a class="dir-btn" href="#">About me!</a>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
